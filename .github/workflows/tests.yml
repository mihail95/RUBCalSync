name:  Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"
      - run: pytest
